name: Build

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: Checkout ZMK
        run: git clone --depth=1 --branch main https://github.com/moergo-sc/zmk src
      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-24.11
      - uses: cachix/cachix-action@v17
        with:
          name: moergo-glove80-zmk-dev
          skipPush: true
      - uses: actions/cache@v5
        with:
          path: ~/.cache/nix
          key: nix-store-${{ runner.os }}-23.11
          restore-keys: nix-store-${{ runner.os }}-
      - name: Build Glove80 combined firmware
        run: nix-build config -o combined
      - name: Copy result out of nix store
        run: cp combined/glove80.uf2 glove80.uf2
      - name: Upload result
        uses: actions/upload-artifact@v7
        with:
          name: glove80.uf2
          path: glove80.uf2
